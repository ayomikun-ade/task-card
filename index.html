<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Task Card</title>
  </head>
  <body>
    <main>
      <article data-testid="test-todo-card" class="todo-card">
        <header class="todo-header">
          <div class="todo-title-row">
            <h2 data-testid="test-todo-title" class="todo-title">
              Finalize landing page design
            </h2>
            <span
              data-testid="test-todo-priority"
              class="todo-priority"
              aria-label="Priority: High"
            >
              High
            </span>
          </div>

          <p data-testid="test-todo-description" class="todo-description">
            Review the latest mockups from the design team, gather feedback from
            stakeholders, and prepare the final version for handoff to
            development.
          </p>
        </header>

        <div class="todo-meta">
          <time
            data-testid="test-todo-due-date"
            class="todo-due-date"
            datetime="2026-04-18T18:00:00Z"
          >
            Due Apr 18, 2026
          </time>

          <span
            data-testid="test-todo-time-remaining"
            class="todo-time-remaining"
            aria-live="polite"
          >
            Calculating...
          </span>

          <span
            data-testid="test-todo-status"
            class="todo-status"
            aria-label="Status: In Progress"
          >
            In Progress
          </span>
        </div>

        <ul
          data-testid="test-todo-tags"
          class="todo-tags"
          role="list"
          aria-label="Task tags"
        >
          <li data-testid="test-todo-tag-work" class="todo-tag">work</li>
          <li data-testid="test-todo-tag-urgent" class="todo-tag">urgent</li>
          <li class="todo-tag">design</li>
        </ul>

        <footer class="todo-footer">
          <div class="todo-toggle-group">
            <input
              type="checkbox"
              id="todo-complete"
              data-testid="test-todo-complete-toggle"
              class="todo-checkbox"
              aria-label="Mark task as complete"
            />
            <label for="todo-complete" class="todo-checkbox-label">
              Mark complete
            </label>
          </div>

          <div class="todo-actions">
            <button
              data-testid="test-todo-edit-button"
              class="todo-btn todo-btn-edit"
              aria-label="Edit task"
            >
              Edit
            </button>
            <button
              data-testid="test-todo-delete-button"
              class="todo-btn todo-btn-delete"
              aria-label="Delete task"
            >
              Delete
            </button>
          </div>
        </footer>
      </article>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
