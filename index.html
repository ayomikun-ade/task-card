<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A testable todo task card component built with neobrutalism design" />
    <meta name="author" content="Ayomikun" />
    <meta name="theme-color" content="#1E3A5F" />
    <meta property="og:title" content="Task Card" />
    <meta property="og:description" content="A testable todo task card component built with neobrutalism design" />
    <meta property="og:type" content="website" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='2' y='2' width='28' height='28' rx='0' fill='%23DBEAFE' stroke='%231E3A5F' stroke-width='3'/%3E%3Cpath d='M9 16l5 5 9-9' fill='none' stroke='%231E3A5F' stroke-width='3' stroke-linecap='square'/%3E%3C/svg%3E" />
    <title>Task Card</title>
  </head>
  <body>
    <main>
      <article data-testid="test-todo-card" class="todo-card">
        <header class="todo-header">
          <div class="todo-title-row">
            <h2 data-testid="test-todo-title" class="todo-title">
              Finalize landing page design
            </h2>
            <span
              data-testid="test-todo-priority"
              class="todo-priority"
              aria-label="Priority: High"
            >
              High
            </span>
          </div>

          <p data-testid="test-todo-description" class="todo-description">
            Review the latest mockups from the design team, gather feedback from
            stakeholders, and prepare the final version for handoff to
            development.
          </p>
        </header>

        <div class="todo-meta">
          <time
            data-testid="test-todo-due-date"
            class="todo-due-date"
            datetime="2026-04-16T12:00:00Z"
          >
            Due Apr 16, 2026
          </time>

          <time
            data-testid="test-todo-time-remaining"
            class="todo-time-remaining"
            aria-live="polite"
          >
            Calculating...
          </time>

          <span
            data-testid="test-todo-status"
            class="todo-status"
            aria-label="Status: In Progress"
          >
            In Progress
          </span>
        </div>

        <ul
          data-testid="test-todo-tags"
          class="todo-tags"
          role="list"
          aria-label="Task tags"
        >
          <li data-testid="test-todo-tag-work" class="todo-tag">work</li>
          <li data-testid="test-todo-tag-urgent" class="todo-tag">urgent</li>
          <li class="todo-tag">design</li>
        </ul>

        <footer class="todo-footer">
          <div class="todo-toggle-group">
            <input
              type="checkbox"
              id="todo-complete"
              data-testid="test-todo-complete-toggle"
              class="todo-checkbox"
              aria-label="Mark task as complete"
            />
            <label for="todo-complete" class="todo-checkbox-label">
              Mark complete
            </label>
          </div>

          <div class="todo-actions">
            <button
              data-testid="test-todo-edit-button"
              class="todo-btn todo-btn-edit"
              aria-label="Edit task"
            >
              Edit
            </button>
            <button
              data-testid="test-todo-delete-button"
              class="todo-btn todo-btn-delete"
              aria-label="Delete task"
            >
              Delete
            </button>
          </div>
        </footer>
      </article>
    </main>

    <footer class="page-credit">made by ayomikun</footer>

    <script src="./script.js"></script>
  </body>
</html>
